<!doctype html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
    <script src="/spaify.js"></script>
	<link rel="stylesheet" href="/global_styles.css"/>
	<link rel="stylesheet" href="/form_page_style.css"/>
	<script>
		function showError(msg){
			const elem = document.getElementById("error-message");
			elem.innerHTML = msg;
			elem.style.display = "block";
		}
		function hideError(){
			document.getElementById("error-message").style.display = "none";
		}
		function handleRedirect(response){
			const params = new URLSearchParams(window.location.search);
			const destination = params.get("redirect");
			if(!destination){
				(window.SPAify?.navigateTo || window.location.assign.bind(window.location))(response.url);
				return;
			}
			(window.SPAify?.navigateTo || window.location.assign.bind(window.location))(window.location.origin + decodeURIComponent(destination));
		}
		async function sendForm(event){
			event.preventDefault();
			const fd = new FormData(document.getElementById('login-form'));
			hideError();

			const response = await fetch("/login", {method:'POST', body:new URLSearchParams(fd)});
			if(response.redirected){
				handleRedirect(response);
				return;
			}
			showError(await response.text())

			return false;
		}
		async function guestLogin(event,username=''){
			hideError();
			const params = new URLSearchParams();
			params.set('username',username);
			const response = await fetch("/login-guest", {method:'POST', body:params});
			if(response.redirected){
				handleRedirect(response);
				return;
			}
			showError(await response.text())

			return false;
		}
		function guestLoginWithUsername(event){
			const username = prompt("Custom username?",document.getElementById("username").value);
			if(username==null){
				return;
			}
			guestLogin(event,username);
		}

	</script>
</head>
<body>
<main>
	<div class="main-content">
		<h3>Log in</h3>
		<br>
		<form id="login-form" onsubmit="sendForm(event)">
			<label for="username">Username</label><input name="username" id="username" type="text"/>
			<label for="password">Password</label><input name="password" id="password" type="password"/>
			<input type="submit" value="Log in" />
			<div class="error-message" id="error-message">i get em</div>
		</form>
		<br>
		<br>
		<a onclick="guestLogin(event)" href="#">Or continue as a guest</a>
		<br><br>
		<a onclick="guestLoginWithUsername(event)" href="#">Guest with custom username</a>
		<br><br>
		<a href="/register.html">Or register an account</a>
	</div>
</main>
</body>
</html>
