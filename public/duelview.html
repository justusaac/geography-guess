<!doctype html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel</title>
    <script src="/spaify.js"></script>
    <link rel="stylesheet" href="/global_styles.css"/>
    <link rel="stylesheet" href="/MysteryPanoStyle.css"/>
    <style>
    	.health-bar{
    		padding:3px;
    		display:inline-block;
    		width:7em;
    		--max-health:10000;
    		--current-health:67;
    		--min-health:0;
    		counter-reset: maxhealth var(--max-health) currenthealth round(max(var(--current-health), var(--min-health)));
    		--health-bg-color:hsl(min(calc(var(--current-health) / var(--max-health) * 200deg), 120deg) 100% 40%);
    		background:  linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.19)), linear-gradient( to bottom, var(--health-bg-color) 0%) ;
    		background-size:max(0%, calc(var(--current-health) / var(--max-health) * 100%));
    		background-color:rgba(0,0,0,0.4);
    		background-repeat:no-repeat;
    		border: 1px solid #959595;
    		border-radius:4px;
    		transition: --current-health 2s ease-in-out 1.5s;
    		&::after{
    			content: counter(currenthealth) " / " counter(maxhealth);
    			color:white;
    		}
    	}
    	.negative-available{
    		--min-health:var(--current-health);
    	}
    	@property --max-health{
			syntax:"<integer>";
			inherits:true;
			initial-value:0;
		}
    	@property --current-health{
			syntax:"<number>";
			inherits:true;
			initial-value:0;
		}
		.notransition{
			transition: none !important;
		}
		.game-info td{
			padding:3px;
			padding-top:0px;
		}
		.game-info td:first-child{
			text-align:right;
		}
		.game-info tr:first-child td{
			padding-top:3px;
		}
		.red-highlight{
			background-color: rgba(255,90,90,0.35);
		}
		.green-highlight{
			background-color: rgba(90,255,90,0.3);
		}
    </style>
</head>
<body>
	<div id="game-container">
		<span class="error-popup hidden">
			<span>
				<u>Error:</u>
				<span class="error-message-container">No error!</span>
				(try&nbsp;reloading)
			</span>
			<button class="close-error">
				<svg height="15px" width="15px" viewBox="0 0 12 12">
					<line x1="0" y1="0" x2="12" y2="12" stroke-width="2px" stroke="red"/>
					<line x1="12" y1="0" x2="0" y2="12" stroke-width="2px" stroke="red"/>
				</svg>
			</button>
		</span>
			<span class="round-timer hidden"></span>
		<div class="pano-container">
			<div class="pano-container-real"></div>
			<table class="game-info">
				<tbody class="health-container">
				</tbody>
			</table>
			<div class="game-controls">
				<span>
					<button class="movement-btn breadcrumb-start-btn">Place breadcrumbs</button>
					<button class="movement-btn breadcrumb-return-btn">Follow breadcrumbs</button>
					<button class="movement-btn breadcrumb-both-btn">Place + Follow</button>
					<button class="movement-btn step-back-btn">Step back</button>
					<button class="movement-btn reset-pos-btn">Back to start</button>
				</span>
				<svg width="48" height="48" class="compass">
					<circle cx="24" cy="24" r="24" fill="gray"/>
					<polygon points="24,2 16,24 32,24" fill="red"/>		
					<polygon points="24,46 16,24 32,24" fill="white"/>
				</svg>
			</div>
			<div class="button-and-map">
				<button class="mobile-map-expander"></button>
				<div class="size-button-holder">
					<svg class="size-button increase" width="24" height="24">
						<symbol id="size-button-arrow">
							<circle cx="12" cy="12" r="12" fill="white"/>
							<polyline points="18,18 9,9" stroke="black" stroke-width="2px"/>
							<polygon points="6,6 12,8 8,12" stroke="black"/>
						</symbol>
						<use href="#size-button-arrow"/>
					</svg>
					<svg class="size-button decrease" width="24" height="24" transform="rotate(180)">
						<use href="#size-button-arrow"/>
					</svg>
				</div>
				<div class="map-container">
				</div>
				<button class="lock-in-button">Guess</button>
			</div>
		</div>
		<div class="round-results-container hidden">
			<div class="round-results-map-container">
			</div>
			<div class="round-results-bottom">
				<div class="round-results-message"></div>
			</div>
		</div>
		<div class="game-results-container hidden">
			<div class="game-results-map-container">
			</div>
			<div class="game-results-bottom">
				<div class="game-results-message">
				</div>
			</div>
		</div>
	</div>
	<script src="/MysteryPano.js"></script>
	<script>
		var DuelPano = class DuelPano extends MysteryPano {
			constructor(rootElem, socketURL){
				super(rootElem, socketURL);
				//this.socket.addEventListener('message',console.log)
				this.socket.addEventListener('message',(msg)=>{
					const data = JSON.parse(msg.data);
					if(data.type=="new_duel"){
						const {new_id} = data;
						const new_href = window.location.origin+"/duelroom/"+new_id;
						(window.SPAify?.navigateTo || window.location.assign.bind(window.location))(new_href);
					}
					if(data.type=="game_info"){
						this.calculate_round_results = data.rules.pinpointing 
							? this.calculate_round_results_pinpointing 
							: this.calculate_round_results_normal
					}
				})
			}
			static message_equal(a,b){
				return a?.round===b?.round && a?.type===b?.type
			}
			show_pano(round_data){
				const curr_msg = {round:round_data.round, type:"round"};
				const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
				if(!DuelPano.message_equal(curr_msg,this.most_recent_msg)){
					super.show_pano(round_data);
					//Show "you" first
					const team_order = Object.keys(round_data.health_before).sort((a,b)=>(b==you_team)-(a==you_team));
					//Show current health levels
					for(const elem of this.root.getElementsByClassName("health-container")){
						elem.innerHTML = '';
						for(const team of team_order){
							const tr = document.createElement('tr');
							const health = round_data.health_before[team];
							const max_health = this.game_info.rules.max_health;
							const td_name = document.createElement('td');
							td_name.appendChild(document.createTextNode(`${team}`));
							if(team==you_team){
								td_name.style.color = "yellow";
							}
							tr.appendChild(td_name);
							const td_health = document.createElement('td');
							const health_bar = document.createElement('span');
							health_bar.classList.add("health-bar","notransition");
							if(this.game_info.rules.pinpointing){
								health_bar.classList.add("negative-available");
							}
							health_bar.style.setProperty("--max-health", max_health);
							health_bar.style.setProperty("--current-health", health);
							td_health.appendChild(health_bar);
							tr.appendChild(td_health);
							elem.appendChild(tr)
						}
					}
					if(round_data.health_before[you_team]<=0 && !this.game_info.rules.pinpointing){
						google.maps.event.clearListeners(this.map, "click");
						for(const elem of this.root.getElementsByClassName("lock-in-button")){
							elem.disabled = true;
							elem.innerHTML = "You&nbsp;are&nbsp;eliminated";
						}
					}
				}
				this.most_recent_msg = curr_msg;
				this.update_guesses(round_data.guesses, round_data.start_time)
			}
			update_guesses(guesses, start_time){

				//Timer will be set to overall round timer however actual timer maybe shorter if someones already guessed
            	const lock_in_time = Object.values(guesses).reduce((acc,curr)=>{
            		if(!acc){
            			return curr.final;
            		}
            		if(!curr.final){
            			return acc;
            		}
            		return Math.min(acc,curr.final)
            	}, false);
            	const now = Date.now();
	            let time_left_normal = (this.game_info.rules.time_limit || Infinity)-(now-start_time);
                let time_left_post_guess = (this.game_info.rules.time_limit_after_guess || Infinity)-(now-(lock_in_time || Infinity))
            	if(time_left_post_guess<time_left_normal){
					this.set_timer(lock_in_time, this.game_info.rules.time_limit_after_guess);
				}


				//Has the player already guessed or clicked around
				//over complicated system to avoid clearing map and flashing unchanged markers
				const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
				const your_guess = guesses[this.game_info.you]
				if(your_guess){
					if(!this.marker){
						this.marker = new google.maps.marker.AdvancedMarkerElement();
						this.add_to_map(this.marker);
					}
					this.marker.position = your_guess.location;

					for(const btn of this.root.getElementsByClassName("lock-in-button")){
						btn.disabled = Boolean(your_guess.final);
					}
				}
				//show teammate guesses on the map
				this.team_markers ??= []
				let marker_idx = 0;
				for(let i=0; i<this.game_info.rules.teams[you_team].length; i++){
					const player = this.game_info.rules.teams[you_team][i]
					if(player==this.game_info.you){
						continue;
					}
					const player_guess = guesses[player]
					if(!player_guess){
						continue;
					}
					if(!this.team_markers[marker_idx]){
						const pin_element = new google.maps.marker.PinElement({
							background:"lightblue"
						}).element;
						const marker = new google.maps.marker.AdvancedMarkerElement({position:player_guess.location, content:pin_element})

						this.team_markers.push(marker);
					}
					const marker = this.team_markers[marker_idx]
					marker.content.style.opacity = player_guess.final ? "70%" : "30%";
					marker.position = player_guess.location;
					this.add_to_map(marker);
					marker_idx++;
				}
				while(this.team_markers.length>marker_idx){
					this.team_markers.pop().setMap(null);
				}
			}
			get_multiplier(round_idx){
		        const first_round = this.game_info.rules.first_multiplier_round;
		        const step = this.game_info.rules.multiplier_increase;
		        if(!first_round || !step){
		            return 1;
		        }
		        if((round_idx+1)<first_round){
		            return 1;
		        }
		        //scaling factor to dodge floating point errors
		        return 1+((step*100)*((round_idx+1)-(first_round-1)))/100;
		    }
		    calculate_round_results_normal(health_before, guesses, multiplier){
		    	const new_health = {};
		    	const delta_messages = {};
	            const max_score = Object.values(guesses).reduce((acc,curr)=>Math.max(acc,curr.score),0);
	            const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
	            let your_team_score = 0;
	            for(const team in health_before){
	                const team_guesses = this.game_info.rules.teams[team].map(player=>guesses[player]);
	                const max_score_team = team_guesses.reduce((acc,curr)=>Math.max(acc,(curr?.score ?? 0)),0);
	                if(team==you_team){
	                	your_team_score = max_score_team;
	                }
	                const damage = Math.floor((max_score-max_score_team)*multiplier);
	                new_health[team] = health_before[team]-damage;
	                delta_messages[team] = `<span style="color:${(health_before[team]<=0) ? "rgba(0,0,0,0)" : damage>0 ? "red" : "green"}">${-damage}</span>`
	            }
				const your_score = guesses[this.game_info.you]?.score || 0;
				const summary_message = 
					(health_before[you_team]==0) ? "You are spectating."
					: (your_team_score == max_score) ? `${your_team_score} points, ${your_score==your_team_score ? "you win" : "your team wins"} this round!${multiplier != 1 ? ` (${multiplier}x damage)` : ''}` 
					: `You lost ${max_score-your_team_score}${multiplier==1 ? '' : ` * ${multiplier} = ${Math.floor((max_score-your_team_score)*multiplier)}`} health.`;
		        return {new_health,delta_messages,summary_message};
		    }
		    calculate_round_results_pinpointing(health_before, guesses){

	            const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
		    	const new_health = {...health_before};
		    	const delta_messages = Object.fromEntries(Object.keys(health_before).map(x=>[x,'']));
		    	let first_lock = null;
		        let first_lock_player = null;
		        //Important to consistently sort because of extremely rare case of multiple guesses on the same timestamp
		        const guess_order = Object.keys(guesses).sort();
		        for(const player of guess_order){
		            const guess = guesses[player];
		            if(typeof guess.final == "number" && (first_lock==null || guess.final<first_lock.final)){
		                first_lock = guess;
		                first_lock_player = player;
		            }
		        }
		        //+1 or -1 point for first guesser based on if it's a 5k or not
		        if(first_lock!=null){
		            const first_lock_team = Object.keys(health_before).filter(teamname=>this.game_info.rules.teams[teamname].includes(first_lock_player))[0];
		            if(first_lock.score==5000){
		                new_health[first_lock_team]++;
		                delta_messages[first_lock_team] += "+1: First pinpoint";
		            }
		            else{
		                new_health[first_lock_team]--;
		                delta_messages[first_lock_team] += "-1: First w/o 5k";
		            }
		        }
		        //1 point for closest guess without a tie between different teams
		        let best_score = -1;
		        let best_score_team = null;
		        for(const team in health_before){
		            const team_guesses = this.game_info.rules.teams[team].map(player=>guesses[player]);
		            const max_score_team = team_guesses.reduce((acc,curr)=>Math.max(acc,(curr?.score ?? 0)),0);
		            if(max_score_team>best_score){
		                best_score = max_score_team;
		                best_score_team = team;
		            }
		            else if(max_score_team==best_score){
		                best_score_team = null;
		            }
		        }
		        if(best_score_team!=null){
		            new_health[best_score_team]++;
		            if(delta_messages[best_score_team]){
		            	delta_messages[best_score_team] += "<br>"
		          	}
		            delta_messages[best_score_team] += "+1: Closest guess"
		        }
		        for(const team in delta_messages){
		        	const delta = new_health[team]-health_before[team];
		        	delta_messages[team] = `<span style="color:${delta>0 ? "green" : "red"}">${delta_messages[team] || "&plusmn;0"}</span>`
		        }
		        const your_delta = new_health[you_team]-health_before[you_team];
		        const s = Math.abs(your_delta)!=1?"s":'';
		        const summary_message = 
        			(your_delta > 0)
        			? `You gained ${your_delta} point${s}!`
        			: (your_delta==0)
        			? "You didn't get any points."
        			: `You lost ${-your_delta} point${s}.`;
		        return {new_health, delta_messages, summary_message};
		    }
		    calculate_round_results(...args){
		    	return this.calculate_round_results_normal(...args);
		    }
			show_round_results(round_data){
				this.pano?.setPano("NOPANO");
				const curr_msg = {round:round_data.round, type:"round_results"};
				this.most_recent_msg = curr_msg;
				this.switch_view('round-results-container');
				for(const container of this.root.getElementsByClassName("round-results-map-container")){
					container.appendChild(this.map.getDiv());
				}
				this.show_movement_history();

				const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
				const damage_multiplier = this.get_multiplier(round_data.round);
				const {new_health, delta_messages, summary_message} = this.calculate_round_results(round_data.health_before, round_data.guesses, damage_multiplier);

				const tables = [];
				for(const elem of this.root.getElementsByClassName("round-results-message")){
					elem.innerHTML = '';
					const span = document.createElement('span');
					span.innerHTML = summary_message;
					elem.appendChild(span);
					elem.appendChild(document.createElement("br"));
					const table = document.createElement("table");
					table.classList.add("game-results-table");
					elem.appendChild(table);
					tables.push(table);
				}
				//Show "you" first
				const team_order = Object.keys(round_data.health_before).sort((a,b)=>(b==you_team)-(a==you_team));
				const is_team_game = !Object.entries(this.game_info.rules.teams).reduce((acc,curr)=>acc&&(curr[1].length==1)&&(curr[0]==curr[1][0]),true)
				const guesses = []
				const labels = [];
				const usernames =[];
				const teamnames = [];
				for(const team of team_order){
					const sorted_users = [...this.game_info.rules.teams[team]].sort((a,b)=>(round_data.guesses[b]?.score || 0)-(round_data.guesses[a]?.score || 0))
					for(let i=0; i<sorted_users.length; i++){
						const user = sorted_users[i];
						const guess = round_data.guesses[user];
						if(guess){
							const label=(user==this.game_info.you ? '★' : (this.game_info.rules.teams[you_team].includes(user) ? "T" : "O"));
							if(i==0){
								guesses.push(guess);
								labels.push(label);
								usernames.push(user);
								teamnames.push(team);
							}
							else{
								this.add_guess_to_map(guess, label, user, team);
							}
						}
						for(const table of tables){
							const health_before = round_data.health_before[team];
							const max_health = this.game_info.rules.max_health;
							const health_after = new_health[team];
							const tr = document.createElement('tr');
							table.appendChild(tr);
							if(i==0 && is_team_game){
								const team_td = document.createElement('td');
								team_td.textContent = team;
								team_td.rowSpan = sorted_users.length;
								team_td.style.color = MysteryPano.get_color_from_string(team);
								team_td.style.wordBreak = "break-word"
								tr.appendChild(team_td);
							}
							const username_td = document.createElement('td');
							username_td.textContent = user;
							username_td.style.wordBreak = "break-word"
							if(user==this.game_info.you){
								username_td.classList.add('highlighted');
							}
							tr.appendChild(username_td);
							const points_td = document.createElement('td');
							points_td.innerHTML = `<b>${guess?.score || 0}</b> points<br>${guess?.distance ? MysteryPano.format_distance(guess.distance) : "No guess"}`;
							tr.appendChild(points_td);
							if(i==0){
								const delta_td = document.createElement("td");
								delta_td.rowSpan = sorted_users.length;
								delta_td.innerHTML = delta_messages[team]
								tr.appendChild(delta_td);
								const health_td = document.createElement('td');
								health_td.rowSpan = sorted_users.length;
								tr.appendChild(health_td);
								const health_bar = document.createElement('span');
								health_td.appendChild(health_bar);
								health_bar.classList.add("health-bar","notransition");
								if(this.game_info.rules.pinpointing){
									health_bar.classList.add("negative-available");
								}
								health_bar.style.setProperty("--max-health", max_health);
								health_bar.style.setProperty("--current-health", health_before);
								health_bar.offsetHeight;
								health_bar.classList.remove("notransition");
								health_bar.style.setProperty("--current-health", health_after);
							}
						}
					}
				}
				if(Object.keys(round_data.guesses).length==0){
					this.add_location_to_map(round_data.location, (round_data.round+1).toString());
					this.map.panTo(round_data.location);
					this.map.setZoom(6);
				}
				else{
					this.add_results_to_map(guesses, Array(guesses.length).fill(round_data.location), usernames, labels, Array(guesses.length).fill((round_data.round+1).toString()), teamnames);
				}
				//12 second time for viewing results(keep the same as the server)
				this.set_timer(round_data.finish_time, 12000, true);
			}
			show_game_results(game_info){
				this.switch_view('game-results-container');
				this.clear_timer();
				this.clear_map();
				for(const container of this.root.getElementsByClassName("game-results-map-container")){
					container.appendChild(this.map.getDiv());
				}
				this.map.fitBounds(google.maps.LatLngBounds.MAX_BOUNDS);
				const you_team = Object.keys(this.game_info.rules.teams).filter(t=>this.game_info.rules.teams[t].includes(this.game_info.you))[0];
				const team_order = Object.keys(game_info.health_before[0]).sort((a,b)=>(b==you_team)-(a==you_team));
				for(const container of this.root.getElementsByClassName("game-results-message")){
					container.innerHTML = ""
					const base = new DocumentFragment();
					const table = document.createElement("table");
					table.classList.add("game-results-table");
					const header = document.createElement("thead");
					const filler_th = document.createElement("th");
					filler_th.style.border="none";
					header.appendChild(filler_th);
					for(const team of team_order){
						const th = document.createElement("th");
						th.textContent = team;
						th.style.color = MysteryPano.get_color_from_string(team);
						th.style.wordBreak = "break-all"
						th.colSpan = 2;
						header.appendChild(th);
					}
					table.appendChild(header);

					const statusmsg = document.createElement("span");
					const ending_health = game_info.health_before[game_info.health_before.length-1]
					statusmsg.style.fontSize = "1.5em";
					statusmsg.innerHTML = 
						ending_health[you_team]>=(this.game_info.rules.pinpointing ? this.game_info.rules.pinpointing_target : 0)
							? "Victory! You won." 
							: "Defeat! You lost.";
					base.prepend(statusmsg, document.createElement("br"));
					for(let i=0; i<game_info.health_before.length-1; i++){
						const row = document.createElement('tr');
						const roundno = document.createElement('td');
						roundno.innerHTML = `Round ${i+1}`
						row.appendChild(roundno);
						const show_round_on_map = ()=>{
							const guesses = [];
							const label_guesses = [];
							const usernames = [];
							const teamnames = [];
							for(const team of team_order){
								const sorted_users = [...this.game_info.rules.teams[team]].sort((a,b)=>( game_info.guesses[i][b]?.score || 0)-(game_info.guesses[i][a]?.score || 0))
								let first = true;
								for(const player of sorted_users){
									const guess = game_info.guesses[i][player];
									if(!guess){
										continue;
									}
									const label = player==this.game_info.you ? '★' : (this.game_info.rules.teams[you_team].includes(player) ? "T" : "O")
									if(first){
										guesses.push(guess);
										label_guesses.push(label);
										usernames.push(player);
										teamnames.push(team);
										first=false;
									}
									else{
										this.add_guess_to_map(guess, label, player, team);
									}
								}
							}
							if(!guesses.reduce((acc,curr)=>acc||curr, false)){
								this.add_location_to_map(game_info.locations[i], (i+1).toString());
								this.map.panTo(game_info.locations[i]);
								this.map.setZoom(6);
							}
							else{
								this.add_results_to_map(guesses, Array(guesses.length).fill(game_info.locations[i]), usernames, label_guesses, Array(guesses.length).fill(i+1), teamnames)
							}
						}
						row.addEventListener("click", ()=>{
							this.clear_map();
							show_round_on_map();
						});
						row.style.cursor = "pointer";

						const team_guesses = {};
						for(const team in this.game_info.rules.teams){
							const guesses = []
							for(const player of this.game_info.rules.teams[team]){
								if(game_info.guesses[i][player]){
									guesses.push(game_info.guesses[i][player]);
								}
							}
							team_guesses[team] = guesses;
						}
						const team_best_guesses = {}
						for(const team in team_guesses){
							team_best_guesses[team] = team_guesses[team].reduce((acc,curr)=>{
								if(!acc){
									return curr;
								}
								if(!curr){
									return acc;
								}
								if(acc.score>curr.score){
									return acc;
								}
								return curr;
							},null)
						}

						for(const team of team_order){

							const guess = team_best_guesses[team];
							const td_points = document.createElement('td');
							td_points.innerHTML = `
								<span>
									${guess?.score || 0} points
									<br>
									${guess?.distance ? MysteryPano.format_distance(guess.distance) : "No guess"}
								</span>
							`;
							row.appendChild(td_points);
							const td = document.createElement('td');
							const health_before = game_info.health_before[i][team];
							const health_after = game_info.health_before[i+1][team];
							const delta = health_after-health_before;
							if(health_after==0){
								td.classList.add("red-highlight")
							}
							else if(i+1==game_info.health_before.length-1){
								td.classList.add("green-highlight")
								show_round_on_map();
							}
							let delta_message = `<span style="color:${(health_before<=0) ? "rgba(0,0,0,0)" : delta<0 ? "red" : "green"}">${delta>0?"+":''}${delta}</span>`
							if(this.game_info.rules.pinpointing){
								td.classList.remove("red-highlight");
								td.classList.remove("green-highlight");
								if(i+1==game_info.health_before.length-1){
									td.classList.add(health_after >= this.game_info.rules.pinpointing_target ? "green-highlight" : "red-highlight");
								}
								delta_message = `<span style="color:${delta<0 ? "red" : delta>0 ? "green" : "gray"}">${delta>0?"+":''}${delta}</span>`
							}
							td.innerHTML = `
								<span>
									${delta_message}
									<br>
									<span style="font-size:1.2em">${health_after}</span>
								</span>								
							`;
							row.appendChild(td);
						}
						table.appendChild(row);
					}
					base.appendChild(table);
					base.appendChild(document.createElement("hr"));
					const back_button = document.createElement("a");
					back_button.classList.add("fake-button");
					back_button.href = `/creategame/${this.game_info.mapid}`
					back_button.textContent = "Exit"
					base.appendChild(back_button);
					if(this.game_info.you==this.game_info.owner){
						const replay_button = document.createElement("a");
						replay_button.classList.add("fake-button");
						replay_button.href =`/duelagain/${MysteryPano.get_game_id()}`
						replay_button.textContent = `Play again`
						base.appendChild(replay_button);
					}
					container.appendChild(base);
				}
			}
		}
	</script>
	<script>
		window.onMapsLoad = async ()=>{
			const gameId = MysteryPano.get_game_id();
			const url = (window.location.protocol=="https:" ? "wss:" : "ws:")+"//"+window.location.host+"/ws/duelsession/"+gameId;
			const root = document.getElementById("game-container")
			if(root){
				new DuelPano(root, url);
			}
		};
	</script>
	<script src="/load_maps_api.js"></script>
</body>
</html>
